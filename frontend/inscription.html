<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGrimoire - Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">

    <!-- ============ CARTE D'INSCRIPTION ============ -->
    <div class="bg-gray-900 p-8 rounded-xl border border-gray-700 w-full max-w-md">

        <!-- ===== Titre ===== -->
        <h1 class="text-2xl font-bold text-purple-400 text-center mb-2">Créer un compte</h1>

        <p class="text-gray-400 text-center text-sm mb-8">Inscris-toi pour gérer tes snippets</p>

        <form id="formulaire-inscription" class="flex flex-col gap-4">

            <!-- ===== Champ email ===== -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input
                    type="email"
                    id="champ-email"
                    placeholder="ton@email.com"
                    class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500"
                >
            </div>

            <!-- ===== Champ mot de passe ===== -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Mot de passe</label>
                <div class="relative">
                    <input
                        type="password"
                        id="champ-mot-de-passe"
                        placeholder="••••••••"
                        class="w-full bg-gray-800 text-white px-4 py-2 pr-12 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500"
                    >
                    <button
                        type="button"
                        id="bouton-oeil"
                        aria-label="Afficher le mot de passe"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-purple-400"
                    ><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" /></svg></button>
                </div>
            </div>

            <!-- ===== Bouton inscription ===== -->
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg font-bold mt-2">
                Créer un compte
            </button>

        </form>

        <!-- ===== Message d'erreur ===== -->
        <p id="message-erreur" class="text-center text-sm text-red-400 mt-4"></p>

        <!-- ===== Lien connexion ===== -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Déjà un compte ?
            <a href="connexion.html" class="text-purple-400 hover:text-purple-300">
                Se connecter
            </a>
        </p>

    </div>

    <!-- ============ SUPABASE ============ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="inscription.js"></script>

</body>
</html>
