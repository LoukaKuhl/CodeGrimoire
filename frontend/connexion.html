<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGrimoire - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">

    <!-- ============ CARTE DE CONNEXION ============ -->
    <div class="bg-gray-900 p-8 rounded-xl border border-gray-700 w-full max-w-md">

        <!-- ===== Titre ===== -->
        <h1 class="text-2xl font-bold text-purple-400 text-center mb-2">CodeGrimoire</h1>

        <p class="text-gray-400 text-center text-sm mb-8">Connecte-toi pour accéder à tes snippets</p>

        <form class="flex flex-col gap-4">

            <!-- ===== Champ email ===== -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input 
                    type="email"
                    placeholder="ton@email.com"
                    class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500"
                >
            </div>

            <!-- ===== Champ mot de passe ===== -->
            <div>
                <div class="flex items-center justify-between mb-1">
                    <label class="block text-sm text-gray-400">Mot de passe</label>
                    <a href="#" class="text-xs text-purple-400 hover:text-purple-300">
                        Mot de passe oublié ?
                    </a>
                </div>
                <input 
                    type="password"
                    placeholder="••••••••"
                    class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500"
                >
            </div>

            <!-- ===== Bouton connexion ===== -->
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-lg font-bold mt-2">
                Se connecter
            </button>

        </form>

        <!-- ===== Lien inscription ===== -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Pas encore de compte ?
            <a href="#" class="text-purple-400 hover:text-purple-300">
                Créer un compte
            </a>
        </p>

    </div>

</body>
</html>
