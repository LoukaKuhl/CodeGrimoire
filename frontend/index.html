<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGrimoire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { visibility: hidden; }</style>
</head>

<body class="bg-gray-950 text-white min-h-screen">

    <nav class="bg-gray-900 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
        <h1 class="text-xl font-bold text-purple-400">CodeGrimoire</h1>
        <div class="flex items-center gap-3">
            <a href="formulaire.html" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm">
                + Nouveau snippet
            </a>
            <button id="bouton-deconnexion" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm">
                Déconnexion
            </button>
        </div>
    </nav>

    <div class="flex h-screen">

        <aside class="w-80 bg-gray-900 border-r border-gray-700 flex flex-col">
            <div class="p-4">
                <input
                    id="input-recherche"
                    type="text"
                    aria-label="Rechercher un snippet"
                    placeholder="Rechercher un snippet..."
                    class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg text-sm border border-gray-600 focus:outline-none focus:border-purple-500"
                >
            </div>
            <div id="liste-snippets" class="flex-1 overflow-y-auto px-4">
                <p class="text-gray-500 text-sm text-center mt-8">Aucun snippet pour l'instant</p>
            </div>
        </aside>

        <main class="flex-1 bg-gray-950 p-6">
            <div id="detail-snippet">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <h2 id="detail-titre" class="text-xl font-bold">Titre du snippet</h2>
                        <span id="detail-badge" class="text-xs px-2 py-0.5 rounded-full font-medium bg-gray-700 text-white">
                            Langage
                        </span>
                    </div>
                    <div id="actions-detail" class="flex gap-2">
                        <button id="btn-copier" data-action="copier" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded text-sm">
                            Copier
                        </button>
                        <button data-action="modifier" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded text-sm">
                            Modifier
                        </button>
                        <button data-action="supprimer" class="bg-red-700 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">
                            Supprimer
                        </button>
                    </div>
                </div>
                <div id="detail-tags" class="text-sm text-gray-400 mb-4"></div>
                <pre id="detail-code" class="bg-gray-900 rounded-lg p-4 overflow-x-auto text-sm text-green-400">// Ton code apparaîtra ici</pre>
            </div>
        </main>

    </div>

    <!-- ============ SUPABASE ============ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="session.js"></script>
    <script src="app.js"></script>

</body>
</html>
