<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeGrimoire - Nouveau snippet</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen">

    <!-- ============ BARRE DE NAVIGATION ============ -->
    <nav class="bg-gray-900 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
        <h1 class="text-xl font-bold text-purple-400">CodeGrimoire</h1>
        <a href="index.html" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm">
            Retour
        </a>
    </nav>

    <!-- ============ FORMULAIRE ============ -->
    <div class="max-w-3xl mx-auto p-6">

        <h2 class="text-2xl font-bold mb-6">Nouveau snippet</h2>

        <div class="flex flex-col gap-4">

            <!-- ===== Champ titre ===== -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Titre</label>
                <input 
                    id="input-titre"
                    type="text" 
                    placeholder="Ex : Fonction de tri en JavaScript"
                    class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500"
                >
            </div>

            <!-- ===== Champ langage ===== -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Langage</label>
                <select id="input-langage" class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500">
                    <option value="">Choisir un langage</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Python">Python</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="SQL">SQL</option>
                    <option value="PHP">PHP</option>
                </select>
            </div>

            <!-- ===== Champ tags ===== -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Tags</label>
                <input 
                    id="input-tags"
                    type="text" 
                    placeholder="Ex : tri, tableau, algorithme"
                    class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500"
                >
            </div>

            <!-- ===== Champ code ===== -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Code</label>
                <textarea 
                    id="input-code"
                    rows="12"
                    placeholder="Colle ton code ici..."
                    class="w-full bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-purple-500 font-mono text-sm"
                ></textarea>
            </div>

            <!-- ===== Boutons ===== -->
            <div class="flex gap-3 justify-end">
                <a href="index.html" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2 rounded-lg">
                    Annuler
                </a>
                <button onclick="sauvegarderSnippet()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg">
                    Sauvegarder
                </button>
            </div>

        </div>
    </div>

    <!-- ============ SUPABASE ============ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="session.js"></script>
    <script src="formulaire.js"></script>

</body>
</html>
